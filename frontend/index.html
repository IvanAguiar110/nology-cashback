<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cashback Nology</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Calculadora de Cashback</h1>
      <p class="subtitulo">Informe o tipo de cliente e o valor final da compra.</p>

      <form id="formCashback">
        <label for="tipoCliente">Tipo de cliente</label>
        <select id="tipoCliente" required>
          <option value="false">Cliente comum</option>
          <option value="true">Cliente VIP</option>
        </select>

        <label for="valorCompra">Valor da compra</label>
        <input 
          type="number" 
          id="valorCompra" 
          placeholder="Ex: 600" 
          min="0.01" 
          step="0.01" 
          required

        > 
        <label for="percentualDesconto">Percentual de desconto</label>

<div class="campo-percentual">
  <input 
    type="number" 
    id="percentualDesconto" 
    placeholder="Ex: 15" 
    min="0" 
    max="100" 
    step="1" 
    value="0"
    required
  >
  <span>%</span>
</div>
        <button type="submit">Calcular cashback</button>
      </form>

      <div id="resultado" class="resultado escondido"></div>
    </section>

    <section class="card">
      <h2>Meu histórico</h2>
      <p class="subtitulo">Consultas feitas a partir deste IP.</p>

      <div id="historico" class="historico">
        <p>Nenhuma consulta carregada ainda.</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
